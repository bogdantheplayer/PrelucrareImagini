<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Filters</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">L4</div>
      <div>
        <div class="title">Proiect – Filtre</div>
        <div class="subtitle">Electron + Python (OpenCV / FFT)</div>
      </div>
    </div>

  </header>

  <main class="layout">
    <aside class="panel">
      <h2>Controale</h2>

      <div class="field">
        <label>Imagine</label>
        <input id="file" type="file" accept="image/*" />
        <div class="hint" id="fileHint">Alege o imagine (JPG/PNG/BMP).</div>
      </div>

      <div class="field">
        <label>Filtru</label>
        <select id="filter">
          <optgroup label="Spațiale">
            <option>Mean 3x3</option>
            <option>Gaussian 3x3</option>
            <option>Laplace</option>
            <option>High-pass</option>
          </optgroup>
          <optgroup label="Frecvență">
            <option>Ideal Low-Pass (ILPF)</option>
            <option>Gaussian Low-Pass (GLPF)</option>
            <option>Ideal High-Pass (IHPF)</option>
            <option>Gaussian High-Pass (GHPF)</option>
          </optgroup>
        </select>
        <div class="hint">Alege unul din cele 8 filtre.</div>
      </div>

      <div class="field" id="d0wrap">
        <label>D0 (cutoff)</label>
        <div class="row">
          <input id="d0" type="range" min="5" max="200" value="40" />
          <div class="badge"><span id="d0val">40</span></div>
        </div>
        <div class="hint">D0 controlează cât de mult păstrezi din frecvențe.</div>
      </div>

      <div class="buttons">
        <button id="run" class="btn primary">Apply</button>
        <button id="clear" class="btn">Clear</button>
      </div>

      <div class="status" id="status"></div>
    </aside>

    <section class="content">
      <div class="content-header">
        <h2>Rezultate</h2>
        <div class="small" id="summary">Original + filtrul selectat</div>
      </div>

      <div class="grid" id="grid">
        <!-- cards -->
      </div>

      <div class="empty" id="empty">
        <div class="empty-title">Nimic de afișat încă</div>
        <div class="empty-sub">Alege o imagine și apasă <b>Apply</b>.</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
